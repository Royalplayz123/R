<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevCraft — Services & Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --bg2: #0d0d14;
  --bg3: #13131e;
  --accent: #7c5cfc;
  --accent2: #00e5cc;
  --accent3: #ff4d6d;
  --text: #f0eeff;
  --muted: #7a78a0;
  --border: rgba(124,92,252,0.18);
  --card-bg: rgba(19,19,30,0.9);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;min-height:100vh}

/* BG grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(124,92,252,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,92,252,0.12) 0%,transparent 60%);
  pointer-events:none;z-index:0
}

/* NOISE */
.noise{position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:1}

.container{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 24px}

/* NAV */
nav{padding:24px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.logo-tag{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
.nav-badge{background:rgba(124,92,252,0.15);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:6px 14px;border-radius:2px;letter-spacing:.1em;text-transform:uppercase}

/* HERO */
.hero{padding:80px 0 60px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(124,92,252,0.1);border:1px solid var(--border);border-radius:2px;font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;padding:7px 16px;margin-bottom:28px}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(36px,6vw,68px);font-weight:800;letter-spacing:-.04em;line-height:1.0;margin-bottom:20px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{color:var(--muted);font-size:14px;max-width:460px;margin:0 auto 48px;line-height:1.8;font-family:'DM Mono',monospace}

/* CATEGORY TABS */
.cat-wrap{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:56px}
.cat-btn{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:9px 20px;border-radius:2px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--muted);transition:all .2s;position:relative;overflow:hidden}
.cat-btn::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:.2s}
.cat-btn:hover{color:var(--text);border-color:rgba(124,92,252,0.4)}
.cat-btn.active{color:var(--text);border-color:var(--accent);background:rgba(124,92,252,0.12)}
.cat-btn span{position:relative;z-index:1}

/* PLANS GRID */
.plans-section{display:none}
.plans-section.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:80px}

/* CARD */
.plan-card{background:var(--card-bg);border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:28px;position:relative;transition:all .25s;cursor:default;backdrop-filter:blur(12px)}
.plan-card::before{content:'';position:absolute;inset:0;border-radius:4px;background:linear-gradient(135deg,rgba(124,92,252,0.06),transparent 60%);pointer-events:none}
.plan-card:hover{border-color:rgba(124,92,252,0.35);transform:translateY(-3px)}
.plan-card.featured{border-color:rgba(124,92,252,0.5)}
.plan-card.featured::after{content:'POPULAR';position:absolute;top:16px;right:16px;font-size:9px;letter-spacing:.18em;color:var(--accent);background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.3);padding:4px 10px;border-radius:2px}
.plan-id{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;opacity:.6}
.plan-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-bottom:8px}
.plan-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.plan-price-wrap{display:flex;align-items:baseline;gap:6px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.plan-currency{font-size:14px;color:var(--accent);font-weight:500}
.plan-price{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.04em;color:var(--text)}
.plan-unit{font-size:11px;color:var(--muted)}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:9px}
.plan-features li{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:rgba(240,238,255,0.65);line-height:1.5}
.plan-features li::before{content:'//';color:var(--accent);font-size:10px;font-weight:500;flex-shrink:0;margin-top:2px;opacity:.7}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:36px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-txt{font-size:11px;color:var(--muted);letter-spacing:.05em}
.footer-contact{font-size:11px;color:var(--accent);letter-spacing:.05em}

/* scroll hint */
.scroll-hint{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;animation:fadeUp .5s ease .6s both}
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <nav>
    <div>
      <div class="logo">Dev<span>Craft</span></div>
      <div class="logo-tag">// tech services</div>
    </div>
    <div class="nav-badge">Available for hire</div>
  </nav>

  <div class="hero">
    <div class="hero-tag"><span>Services & Pricing</span></div>
    <h1>Build<br>Something<br><em>Powerful</em></h1>
    <p class="hero-sub">Minecraft plugins, web dev, server setups, hosting panels, Discord servers — all built with precision.</p>
  </div>

  <div class="cat-wrap" id="cat-tabs"></div>

  <div id="plans-container"></div>

  <div class="footer">
    <div class="footer-txt">© 2025 DevCraft — All prices in INR (₹)</div>
    <div class="footer-contact">Contact to order a service</div>
  </div>
</div>

<script>
const PLANS_KEY = 'devcraft_plans';
const CATS_KEY = 'devcraft_cats';

const defaultCats = [
  {id:'mc-plugin',name:'Minecraft Plugins'},
  {id:'web-dev',name:'Web Development'},
  {id:'mc-server',name:'Server Setup'},
  {id:'hosting',name:'Hosting & Panels'},
  {id:'discord',name:'Discord Server'}
];

const defaultPlans = [
  {id:1,cat:'mc-plugin',name:'Basic Plugin',desc:'Single-feature custom plugin for your Minecraft server',price:'500',unit:'per plugin',featured:false,features:['1 custom feature','Source code included','1 revision round']},
  {id:2,cat:'mc-plugin',name:'Advanced Plugin',desc:'Complex multi-feature plugin with GUI menus & database',price:'1500',unit:'per plugin',featured:true,features:['Multiple custom features','GUI menus & inventory UI','MySQL/SQLite storage','3 revision rounds']},
  {id:3,cat:'web-dev',name:'Landing Page',desc:'Clean, responsive single-page site for your brand or server',price:'800',unit:'one-time',featured:false,features:['Responsive design','Custom domain setup','Contact/enquiry form']},
  {id:4,cat:'web-dev',name:'Full Website',desc:'Multi-page site with CMS/admin panel',price:'2500',unit:'one-time',featured:true,features:['Up to 5 pages','Admin dashboard','SEO optimized','1 month after-support']},
  {id:5,cat:'mc-server',name:'Basic Server',desc:'Vanilla/Spigot/Paper server with essential plugins configured',price:'600',unit:'one-time',featured:false,features:['Server configuration','Essential plugins','Anti-cheat & security']},
  {id:6,cat:'mc-server',name:'Custom Gamemode',desc:'Full custom gamemode — Skyblock, SMP, Factions, Prison & more',price:'3000',unit:'one-time',featured:true,features:['Complete gamemode setup','Custom plugin suite','Spawn world build','Staff rank configuration']},
  {id:7,cat:'hosting',name:'Pterodactyl Setup',desc:'Full Pterodactyl panel installation with node & custom theme',price:'700',unit:'one-time',featured:false,features:['Panel installation','Node configuration','Theme installation','Addon setup']},
  {id:8,cat:'hosting',name:'Full Hosting Stack',desc:'Pterodactyl + Billing panel + Status page — complete stack',price:'1200',unit:'one-time',featured:true,features:['Pterodactyl panel','WHMCS/Paymenter billing','Status page setup','Full configuration & docs']},
  {id:9,cat:'discord',name:'Basic Discord',desc:'Clean structured Discord with channels, roles & essential bots',price:'300',unit:'one-time',featured:false,features:['Channel structure','Role hierarchy','Essential bots setup']},
  {id:10,cat:'discord',name:'Premium Discord',desc:'Fully branded Discord server with custom bots & ticketing system',price:'800',unit:'one-time',featured:true,features:['Full server branding','Custom bot integration','Ticket/support system','Verification & security']}
];

function getCats(){try{const d=localStorage.getItem(CATS_KEY);return d?JSON.parse(d):defaultCats}catch{return defaultCats}}
function getPlans(){try{const d=localStorage.getItem(PLANS_KEY);return d?JSON.parse(d):defaultPlans}catch{return defaultPlans}}

let activeCat = null;

function render(){
  const cats = getCats();
  const plans = getPlans();
  if(!activeCat || !cats.find(c=>c.id===activeCat)) activeCat = cats[0]?.id;

  const tabsEl = document.getElementById('cat-tabs');
  tabsEl.innerHTML = cats.map((c,i)=>`
    <button class="cat-btn${activeCat===c.id?' active':''}" onclick="setTab('${c.id}')">
      <span>${c.name}</span>
    </button>`).join('');

  const cont = document.getElementById('plans-container');
  cont.innerHTML = cats.map(c=>{
    const catPlans = plans.filter(p=>p.cat===c.id);
    return `<div class="plans-section${activeCat===c.id?' active':''}" id="sec-${c.id}">
      <div class="section-label">${c.name}</div>
      <div class="plans-grid">
        ${catPlans.map((p,i)=>`
          <div class="plan-card${p.featured?' featured':''}">
            <div class="plan-id">SVC-${String(p.id).padStart(3,'0')}</div>
            <div class="plan-name">${p.name}</div>
            <div class="plan-desc">${p.desc}</div>
            <div class="plan-price-wrap">
              <span class="plan-currency">₹</span>
              <span class="plan-price">${Number(p.price).toLocaleString()}</span>
              <span class="plan-unit">/ ${p.unit}</span>
            </div>
            <ul class="plan-features">${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
          </div>`).join('')}
        ${catPlans.length===0?`<div style="color:var(--muted);font-size:13px;padding:24px 0">// No plans in this category yet.</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setTab(id){
  activeCat=id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.plans-section').forEach(s=>s.classList.remove('active'));
  const btn = document.querySelector(`.cat-btn[onclick="setTab('${id}')"]`);
  if(btn) btn.classList.add('active');
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.classList.add('active');
}

render();
</script>
</body>
</html>
